<html
        xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
        data-namespace-typo3-fluid="true"
>
<f:layout name="Module" />

<f:section name="Content">
    <div
            class="a11y-overview container-fluid"
            data-a11y-site-identifier="{siteIdentifier}"
            data-a11y-current-page-uid="{currentPageUid}"
    >

        <div class="mb-4">
            <h2 class="mb-1">
                <f:translate
                        key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:module.overview.title"
                        default="Accessibility overview"
                />
            </h2>
            <p class="text-muted mb-0">
                <f:translate
                        key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:module.overview.description"
                        default="Review the latest scan results and open page-level issue summaries."
                />
            </p>
        </div>

        <f:if condition="!{hasEnabledFields}">
            <div class="alert alert-warning mb-4">
                <strong>
                    <f:translate
                            key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:overview.notice.settingsRequired.title"
                            default="Scanner fields are not configured yet."
                    />
                </strong>
                <div>
                    <f:translate
                            key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:overview.notice.settingsRequired.text"
                            default="Open Settings, choose which fields should be scanned, save your changes, and then start the first scan."
                    />
                </div>
            </div>
        </f:if>

        <f:render
                partial="Shared/RemoteScanProgress"
                arguments="{
                    activeRemoteScan: activeRemoteScan
                }"
        />

        <f:if condition="{proStatus.hasCrawler}">
            <f:render
                    partial="Overview/SourceTabs"
                    arguments="{
                        remoteScan: remoteScan
                    }"
            />
        </f:if>

        <div class="a11y-overview-panel" data-a11y-overview-panel="local">
            <f:render
                    partial="Overview/LocalPanel"
                    arguments="{
                        lastScan: lastScan,
                        totalCounts: totalCounts,
                        pageStats: pageStats,
                        totalLocalPages: totalLocalPages,
                        localPagination: localPagination,
                        localPaginationItems: localPaginationItems,
                        localQuery: localQuery,
                        remoteQuery: remoteQuery,
                        remoteFailedQuery: remoteFailedQuery,
                        remotePagination: remotePagination,
                        remoteFailedPagination: remoteFailedPagination,
                        canScanAll: canScanAll,
                        siteRootPid: siteRootPid,
                        currentPageUid: currentPageUid,
                        isPageContext: isPageContext,
                        currentPageHasIssues: currentPageHasIssues,
                        currentPageDetailUrl: currentPageDetailUrl,
                        scanStatus: scanStatus,
                        exportLocalCsvUrl: exportLocalCsvUrl,
                        exportLocalPdfUrl: exportLocalPdfUrl,
                        proStatus: proStatus,
                        siteIdentifier: siteIdentifier
                    }"
            />
        </div>

        <f:if condition="{proStatus.hasCrawler}">
            <div
                    class="a11y-overview-panel"
                    data-a11y-overview-panel="remote"
                    hidden="hidden"
            >
                <f:render
                        partial="Overview/RemotePanel"
                        arguments="{
                            remoteScan: remoteScan,
                            remotePages: remotePages,
                            remoteFailedPages: remoteFailedPages,
                            totalRemotePages: totalRemotePages,
                            totalRemoteFailedPages: totalRemoteFailedPages,
                            remotePagination: remotePagination,
                            remotePaginationItems: remotePaginationItems,
                            remoteFailedPagination: remoteFailedPagination,
                            remoteFailedPaginationItems: remoteFailedPaginationItems,
                            localPagination: localPagination,
                            localQuery: localQuery,
                            remoteQuery: remoteQuery,
                            remoteFailedQuery: remoteFailedQuery,
                            canScanAll: canScanAll,
                            siteRootPid: siteRootPid,
                            currentPageUid: currentPageUid,
                            currentPageUrl: currentPageUrl,
                            siteIdentifier: siteIdentifier,
                            exportRemoteCsvUrl: exportRemoteCsvUrl,
                            exportRemotePdfUrl: exportRemotePdfUrl,
                            proStatus: proStatus
                        }"
                />
            </div>
        </f:if>

        <f:if condition="{proStatus.showProHints} && !{proStatus.hasCrawler}">
            <f:render
                    partial="Overview/ProHint"
                    arguments="{proStatus: proStatus}"
            />
        </f:if>

    </div>
</f:section>
</html>
