<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div>
    <f:if condition="{totalCounts.total} > 0">
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3">
                <div class="card h-100 border-danger">
                    <div class="card-body">
                        <div class="a11y-stat-card__number text-danger">{totalCounts.critical}</div>
                        <div class="a11y-stat-card__label text-muted mt-1">
                            <f:translate
                                    key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:severity.critical"
                                    default="Critical"
                            />
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-lg-3">
                <div class="card h-100 border-warning">
                    <div class="card-body">
                        <div class="a11y-stat-card__number text-warning">{totalCounts.warning}</div>
                        <div class="a11y-stat-card__label text-muted mt-1">
                            <f:translate
                                    key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:severity.warningPlural"
                                    default="Warnings"
                            />
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-lg-3">
                <div class="card h-100 border-info">
                    <div class="card-body">
                        <div class="a11y-stat-card__number text-info">{totalCounts.info}</div>
                        <div class="a11y-stat-card__label text-muted mt-1">
                            <f:translate
                                    key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:severity.info"
                                    default="Info"
                            />
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-lg-3">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="a11y-stat-card__number">{totalCounts.total}</div>
                        <div class="a11y-stat-card__label text-muted mt-1">
                            <f:translate
                                    key="LLL:EXT:a11y_quality_gate/Resources/Private/Language/locallang.xlf:overview.total"
                                    default="Total open"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </f:if>
</div>
</html>
